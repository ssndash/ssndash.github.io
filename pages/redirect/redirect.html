<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SSNDash | MAX</title>

<link rel="icon" href="https://max.ru/favicon.ico">

<style>
@font-face {
  font-family: "MaxSans";
  src: url("https://max.ru/s/fonts/max-sans/MaxSans-Regular.woff2") format("woff2");
  font-weight: 400;
}

@font-face {
  font-family: "MaxSans";
  src: url("https://max.ru/s/fonts/max-sans/MaxSans-Medium.woff2") format("woff2");
  font-weight: 500;
}

body {
  margin: 0;
  padding: 0;
  background: #0f0f10;
  font-family: "MaxSans", sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  position: relative;
}

.wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  position: relative;
}

.glow {
  position: absolute;
  width: 420px;
  height: 420px;
  background: radial-gradient(circle, rgba(120,80,255,0.35), rgba(0,0,0,0));
  filter: blur(70px);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: -1;
}

.logo {
  width: 320px;
  height: auto;
  z-index: 1;
}

.text {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: 1.5px;
  opacity: 0.9;
  z-index: 1;
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="glow"></div>
  <img src="https://raw.githubusercontent.com/ssndash/ssndash.github.io/8cfc378df21aee37fdeda2cbe5421dc0ac92f676/assets/redirect/logo.svg" class="logo">
  <div class="text">happy april foolz!!</div>
</div>

</body>
</html>
